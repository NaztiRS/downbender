name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Install linters
        run: brew install swiftformat swiftlint
      - name: SwiftFormat
        run: swiftformat --lint .
      - name: SwiftLint
        run: swiftlint --strict --quiet

  test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Test
        # `swift test` can silently run 0 tests when Testing.framework is not
        # picked up (see scripts/test.sh), so assert that tests actually ran.
        run: |
          swift test 2>&1 | tee test-output.log
          grep -Eq "Test run with [1-9][0-9]* tests" test-output.log
